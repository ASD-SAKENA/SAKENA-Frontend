services:
  sakena_frontend:
    image: ghcr.io/asd-sakena/sakena-frontend:latest
    container_name: sakena_frontend
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: true
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/api/health > /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 6
    deploy:
      resources:
        limits:
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - infra_network

networks:
  infra_network:
    external: true
